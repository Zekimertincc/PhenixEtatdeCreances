name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
      - name: Build EXE
        run: mvn package jpackage:jpackage
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: EtatCreancesMerger
          path: target/installer/*.exe