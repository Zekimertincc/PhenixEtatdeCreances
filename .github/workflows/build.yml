name: Build Windows ZIP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          java-package: jdk

      - name: Build fat JAR
        run: mvn package

      - name: Create launch.bat
        shell: pwsh
        run: |
          $content = "@echo off`r`n`"%~dp0jre\bin\java.exe`" -jar `"%~dp0app-shaded.jar`"`r`npause"
          Set-Content -Path launch.bat -Value $content -Encoding ASCII

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path EtatCreancesMerger
          Copy-Item target\app-shaded.jar EtatCreancesMerger\app-shaded.jar
          Copy-Item launch.bat EtatCreancesMerger\launch.bat
          Copy-Item -Path $env:JAVA_HOME -Destination EtatCreancesMerger\jre -Recurse
          Compress-Archive -Path EtatCreancesMerger\* -DestinationPath EtatCreancesMerger.zip

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: EtatCreancesMerger
          path: EtatCreancesMerger.zip