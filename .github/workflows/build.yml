name: Build Windows ZIP
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          java-package: jre
      - name: Build fat JAR
        run: mvn package
      - name: Create launch.bat
        run: echo java -jar app-shaded.jar > launch.bat
      - name: Package ZIP
        run: |
          mkdir EtatCreancesMerger
          copy target\*-shaded.jar EtatCreancesMerger\app-shaded.jar
          copy launch.bat EtatCreancesMerger\launch.bat
          xcopy /E /I "%JAVA_HOME%" EtatCreancesMerger\jre
          Compress-Archive -Path EtatCreancesMerger -DestinationPath EtatCreancesMerger.zip
        shell: pwsh
      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: EtatCreancesMerger
          path: EtatCreancesMerger.zip
